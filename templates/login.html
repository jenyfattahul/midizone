{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MidiZone - Sign In</title>
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>

    <div class="left-panel">
        <h1 class="logo-left">Midi<span class="z-red">Zone</span></h1>
        <h2>Sistem Analisis Potensi Lokasi</h2>
        <br>
        <p>Analisis dan temukan lokasi gerai berpotensi tinggi berdasarkan kalkulasi data yang akurat.</p>
    </div>

    <div class="right-panel">
        <div class="login-card">
            <h1 class="logo-right">Midi<span class="z-blue">Zone</span></h1>
            <h2>SELAMAT DATANG</h2>
            <p>Silakan Sign in ke akun Anda</p>

            <form action="{% url 'dashboard' %}" method="GET">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="Masukkan email Anda" required autocomplete="email">
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Masukkan password Anda" required autocomplete="current-password">
                </div>
                
                <div class="form-options">
                    <span></span> 
                    <a href="#" class="forgot-link">Lupa Password?</a>
                </div>
                
                <button type="submit" class="btn-login">Sign In</button>
            </form>
        </div>
    </div>

</body>
</html>
